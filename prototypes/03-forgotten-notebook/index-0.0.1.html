<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototype 03 — The Forgotten Notebook</title>
  <style>
    :root {
      --ink: #22252a;
      --muted: #68707a;
      --paper: #f7f2e8;
      --paper-deep: #e7ddcc;
      --line: rgba(48, 42, 34, 0.16);
      --accent: #3f5e68;
      --accent-soft: rgba(63, 94, 104, 0.12);
      --shadow: rgba(39, 35, 29, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14) 1px, transparent 1px),
        linear-gradient(#d9d1c3, #eee8dc 46%, #d3dde0);
      background-size: 36px 36px, auto;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px 18px;
    }

    .notebook {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 24px;
      align-items: stretch;
    }

    .cover {
      min-height: 560px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(160deg, #3c3b34, #676052);
      color: #f5efe5;
      box-shadow: 0 20px 60px var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .cover-label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(245, 239, 229, 0.7);
    }

    .cover-mark {
      align-self: center;
      border: 1px solid rgba(245, 239, 229, 0.22);
      border-radius: 10px;
      padding: 22px 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
    }

    .cover-mark .icon {
      display: block;
      font-size: 46px;
      margin-bottom: 14px;
    }

    .cover-mark strong {
      display: block;
      font-size: 21px;
      line-height: 1.25;
    }

    .meta {
      display: grid;
      gap: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(245, 239, 229, 0.72);
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: #d7c9ad;
      transition: width 0.35s ease;
    }

    .page {
      min-height: 560px;
      padding: clamp(24px, 4.5vw, 52px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background:
        linear-gradient(90deg, transparent 0, transparent 54px, rgba(130, 69, 54, 0.12) 55px, transparent 56px),
        repeating-linear-gradient(#fbf7ee 0, #fbf7ee 31px, rgba(63, 94, 104, 0.08) 32px);
      box-shadow: 0 20px 60px var(--shadow);
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro {
      max-width: 620px;
    }

    .subtitle,
    .note {
      margin: 0;
      color: var(--muted);
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    .scene-title {
      margin: 0 0 18px;
      font-family: Arial, sans-serif;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .lines {
      flex: 1;
      display: grid;
      align-content: start;
      gap: 14px;
      margin-bottom: 26px;
    }

    .line {
      margin: 0;
      font-size: clamp(21px, 3vw, 29px);
      line-height: 1.48;
      opacity: 0;
      transform: translateY(7px);
      animation: appear 0.44s ease forwards;
    }

    .line.small {
      font-size: clamp(17px, 2.4vw, 21px);
      color: var(--muted);
    }

    .entry {
      display: inline-block;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: #243b43;
      font-weight: 700;
    }

    .margin-drawing {
      display: inline-flex;
      gap: 12px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
      font-family: Arial, sans-serif;
      font-size: 18px;
    }

    .question,
    .traces {
      border-top: 1px solid var(--line);
      padding-top: 18px;
      display: grid;
      gap: 12px;
      font-family: Arial, sans-serif;
    }

    .question-title {
      margin: 0;
      font-weight: 700;
      line-height: 1.45;
    }

    .choice-list {
      display: grid;
      gap: 10px;
    }

    .choice {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.48);
      cursor: pointer;
    }

    .choice input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .trace-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.5);
    }

    .trace-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--accent);
    }

    .trace-card p {
      margin: 7px 0;
      line-height: 1.45;
    }

    .trace-list {
      margin: 6px 0;
      padding-left: 18px;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      font-family: Arial, sans-serif;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      min-width: 132px;
      background: var(--accent);
      color: white;
      font: 700 15px Arial, sans-serif;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(39, 35, 29, 0.14);
    }

    button:hover {
      background: #263e45;
    }

    button.secondary {
      min-width: auto;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .hidden {
      display: none;
    }

    @keyframes appear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px;
      }

      .notebook {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .cover {
        min-height: 180px;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
      }

      .cover-mark {
        grid-row: 1 / span 2;
        grid-column: 2;
        width: 138px;
        align-self: stretch;
        display: grid;
        place-items: center;
      }

      .cover-mark strong {
        display: none;
      }

      .page {
        min-height: 560px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="notebook">
      <aside class="cover" aria-label="Carnet oublié">
        <div>
          <div class="cover-label">Prototype 03</div>
          <strong>The Forgotten Notebook</strong>
        </div>

        <div class="cover-mark" aria-hidden="true">
          <span class="icon">📖</span>
          <strong>un carnet trouvé par hasard</strong>
        </div>

        <div class="meta">
          <span id="sceneCounter">Scène 1 / 6</span>
          <div class="progress" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <span id="languageLabel">FR + IT</span>
        </div>
      </aside>

      <main class="page">
        <div id="intro" class="intro">
          <h1>The Forgotten Notebook</h1>
          <p class="subtitle">
            Un carnet oublié. Quelques langues. Une lecture qui continue sans tout posséder.
          </p>
        </div>

        <div id="sceneTitle" class="scene-title"></div>
        <div id="storyLines" class="lines"></div>
        <div id="questionBox" class="question hidden"></div>

        <div class="actions">
          <button id="backBtn" class="secondary hidden" type="button">Revenir</button>
          <p id="softNote" class="note">Le carnet s’ouvre lentement.</p>
          <button id="continueBtn" type="button">Commencer</button>
        </div>
      </main>
    </div>
  </div>

  <script>
    const scenes = [
      {
        title: "Scène 1 — Salle calme",
        language: "FR + IT",
        blocks: [
          ["La salle est presque vide.", "Vous attendez quelqu’un.", "Dehors, il pleut un peu."],
          ["Sur une table :", "un petit carnet oublié."],
          ["Le carnet semble avoir voyagé.", "À l’intérieur :", "🇮🇹", "> Per chi continua a cercare."]
        ],
        question: {
          type: "checkbox",
          name: "first_reflex",
          prompt: "Quel est votre premier réflexe ?",
          options: ["continuer", "essayer de deviner", "relire", "hésiter", "autre"]
        }
      },
      {
        title: "Scène 2 — Premier passage italien",
        language: "IT",
        blocks: [
          ["🇮🇹", "> Se trovi questo quaderno,", "> non avere fretta."],
          ["> Viaggiare non significa sempre arrivare."],
          ["> A volte significa soltanto osservare."],
          ["Une date.", "Un vieux billet de train.", "Un mot entouré :", "> frontiera"]
        ],
        question: {
          type: "radio",
          name: "understanding_it",
          prompt: "À ce stade, avez-vous l’impression de comprendre quelque chose ?",
          options: ["🙂 plutôt oui", "😐 un peu", "🤔 difficile à dire", "😵 pas vraiment"]
        }
      },
      {
        title: "Scène 3 — Espagne",
        language: "ES",
        blocks: [
          ["🇪🇸", "> Una estación pequeña.", "> Café demasiado caliente."],
          ["> Una mujer me habló durante varios minutos."],
          ["> No entendí todas las palabras.", "> Pero entendí algo importante."],
          ["> La sonrisa llegó antes que el significado."]
        ],
        question: {
          type: "checkbox",
          name: "continue_support",
          prompt: "Qu’est-ce qui vous a permis de continuer à lire ?",
          options: ["certains mots familiers", "le contexte", "l’ambiance du récit", "la curiosité", "autre"]
        }
      },
      {
        title: "Scène 4 — Glissement plus fort",
        language: "IT + ES",
        blocks: [
          ["🇮🇹 + 🇪🇸", "> Il treno sembrava troppo lento."],
          ["> Pero después comprendí algo extraño."],
          ["> Quando il paesaggio cambia lentamente,", "> anche i pensieri cambiano."],
          ["> A veces las lenguas hacen lo mismo."]
        ],
        question: {
          type: "radio",
          name: "uncertain_moment",
          prompt: "À quel moment vous êtes-vous senti moins sûr ?",
          options: ["début", "milieu", "maintenant"]
        }
      },
      {
        title: "Scène 5 — Portugais plus dense",
        language: "PT",
        blocks: [
          ["🇵🇹", "> Cheguei muito cedo.", "> Ninguém falava comigo."],
          ["> Mesmo assim,", "> não me senti sozinho."],
          ["> Talvez viajar seja isso.", "> Continuar mesmo sem compreender tudo."],
          ["Dans la marge :", '<span class="margin-drawing">☕ 🚆 ∿</span>']
        ],
        question: {
          type: "radio",
          name: "continued_anyway",
          prompt: "Avez-vous continué à lire même sans tout comprendre ?",
          options: ["oui naturellement", "oui mais avec hésitation", "un peu", "difficilement"]
        }
      },
      {
        title: "Scène 6 — Fin suspendue",
        language: "ES + IT + PT + FR",
        blocks: [
          ["Le carnet devient plus dense.", "Certaines pages semblent manquer."],
          ["🇪🇸", "> Las lenguas no siempre separan."],
          ["🇮🇹", "> A volte sembrano porte."],
          ["🇵🇹", "> Ou pequenas pontes."],
          ["🇪🇸", "> Si alguien encuentra este cuaderno…"],
          ["Page suivante :", "🇮🇹", "> forse continuerà il viaggio."],
          ["Page suivante :", "blanche."],
          ["🇫🇷", "> Il manque peut-être des pages."]
        ],
        question: null
      }
    ];

    const answers = {};
    let sceneIndex = 0;
    let blockIndex = -1;
    let finished = false;
    let tracesShown = false;

    const intro = document.getElementById("intro");
    const sceneTitle = document.getElementById("sceneTitle");
    const storyLines = document.getElementById("storyLines");
    const questionBox = document.getElementById("questionBox");
    const continueBtn = document.getElementById("continueBtn");
    const backBtn = document.getElementById("backBtn");
    const softNote = document.getElementById("softNote");
    const sceneCounter = document.getElementById("sceneCounter");
    const languageLabel = document.getElementById("languageLabel");
    const progressBar = document.getElementById("progressBar");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatLine(text) {
      if (text.startsWith("> ")) {
        return `<span class="entry">${escapeHtml(text.slice(2))}</span>`;
      }

      if (text.startsWith("<span")) {
        return text;
      }

      return escapeHtml(text);
    }

    function listAnswer(value, fallback) {
      if (Array.isArray(value) && value.length) return value;
      if (typeof value === "string" && value.trim()) return [value.trim()];
      return [fallback];
    }

    function renderTraces() {
      tracesShown = true;
      finished = true;
      questionBox.innerHTML = "";
      questionBox.className = "traces";

      const reflexes = listAnswer(answers.first_reflex, "un premier mouvement difficile à nommer");
      const supports = listAnswer(answers.continue_support, "des appuis peut-être encore discrets");
      const understanding = answers.understanding_it || "une impression restée ouverte";
      const uncertainty = answers.uncertain_moment || "un moment difficile à situer";
      const continued = answers.continued_anyway || "une persistance difficile à qualifier";

      questionBox.innerHTML = `
        <h2>📖 Vos traces de lecture</h2>

        <section class="trace-card">
          <h3>Premier mouvement</h3>
          <p>Votre premier réflexe semblait être :</p>
          <ul class="trace-list">
            ${reflexes.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </section>

        <section class="trace-card">
          <h3>Compréhension perçue</h3>
          <p>À un moment du carnet, vous aviez l’impression de :</p>
          <p><strong>${escapeHtml(understanding)}</strong></p>
          <p>Une compréhension partielle peut pourtant suffire à continuer à lire.</p>
        </section>

        <section class="trace-card">
          <h3>Appuis de lecture</h3>
          <p>Ce qui semble avoir soutenu votre lecture :</p>
          <ul class="trace-list">
            ${supports.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
          <p>Certaines ressemblances, le contexte ou simplement la curiosité peuvent maintenir le fil.</p>
        </section>

        <section class="trace-card">
          <h3>Zone de flottement</h3>
          <p>Vous situez peut-être l’incertitude vers : <strong>${escapeHtml(uncertainty)}</strong>.</p>
          <p>Ce flottement fait partie de l’expérience : il ne l’interrompt pas nécessairement.</p>
        </section>

        <section class="trace-card">
          <h3>Persistance</h3>
          <p>Face au portugais plus dense, vous avez indiqué : <strong>${escapeHtml(continued)}</strong>.</p>
          <p>Vous avez continué malgré une compréhension parfois partielle.</p>
        </section>

        <section class="trace-card">
          <h3>Page blanche</h3>
          <p>Le carnet ne conclut pas vraiment. Il s’interrompt.</p>
          <p>Il manque peut-être des pages.</p>
        </section>
      `;

      continueBtn.textContent = "Recommencer";
      softNote.textContent = "Le carnet reste interrompu.";
      backBtn.classList.remove("hidden");
    }

    function renderSceneShell() {
      const scene = scenes[sceneIndex];
      intro.classList.add("hidden");
      sceneTitle.textContent = scene.title;
      sceneCounter.textContent = `Scène ${sceneIndex + 1} / ${scenes.length}`;
      languageLabel.textContent = `Langue dominante : ${scene.language}`;
      progressBar.style.width = `${((sceneIndex + 1) / scenes.length) * 100}%`;
      backBtn.classList.toggle("hidden", sceneIndex === 0 && blockIndex <= 0);
    }

    function appendBlock(lines) {
      lines.forEach((line, index) => {
        const p = document.createElement("p");
        p.className = line.length < 30 ? "line small" : "line";
        p.style.animationDelay = `${index * 120}ms`;
        p.innerHTML = formatLine(line);
        storyLines.appendChild(p);
      });
    }

    function renderQuestion(question) {
      questionBox.innerHTML = "";
      questionBox.className = "question";

      const title = document.createElement("p");
      title.className = "question-title";
      title.textContent = question.prompt;
      questionBox.appendChild(title);

      const list = document.createElement("div");
      list.className = "choice-list";

      question.options.forEach(option => {
        const label = document.createElement("label");
        label.className = "choice";

        const input = document.createElement("input");
        input.type = question.type;
        input.name = question.name;
        input.value = option;
        input.checked = question.type === "checkbox"
          ? (answers[question.name] || []).includes(option)
          : answers[question.name] === option;

        input.addEventListener("change", () => {
          if (question.type === "checkbox") {
            answers[question.name] = [...questionBox.querySelectorAll(`input[name="${question.name}"]:checked`)]
              .map(item => item.value);
          } else {
            answers[question.name] = input.value;
          }
        });

        label.appendChild(input);
        label.append(option);
        list.appendChild(label);
      });

      questionBox.appendChild(list);
    }

    function showNext() {
      if (finished) {
        restart();
        return;
      }

      const scene = scenes[sceneIndex];
      renderSceneShell();

      if (blockIndex < scene.blocks.length - 1) {
        blockIndex += 1;
        appendBlock(scene.blocks[blockIndex]);
        continueBtn.textContent = blockIndex === scene.blocks.length - 1 && scene.question
          ? "Noter une trace"
          : "Continuer";
        softNote.textContent = "Le carnet avance par fragments.";
        return;
      }

      if (scene.question && questionBox.classList.contains("hidden")) {
        renderQuestion(scene.question);
        continueBtn.textContent = "Continuer";
        softNote.textContent = "Réponse libre dans l’esprit, pas dans la justesse.";
        return;
      }

      if (sceneIndex < scenes.length - 1) {
        sceneIndex += 1;
        blockIndex = -1;
        storyLines.innerHTML = "";
        questionBox.className = "question hidden";
        continueBtn.textContent = "Continuer";
        softNote.textContent = "La langue se déplace légèrement.";
        showNext();
        return;
      }

      if (!tracesShown) {
        renderTraces();
      }
    }

    function goBack() {
      if (finished) {
        finished = false;
        continueBtn.textContent = "Continuer";
      }

      if (tracesShown) {
        tracesShown = false;
        questionBox.innerHTML = "";
        questionBox.className = "question hidden";
        softNote.textContent = "Vous pouvez relire la page suspendue.";
        return;
      }

      if (!questionBox.classList.contains("hidden")) {
        questionBox.className = "question hidden";
        continueBtn.textContent = "Continuer";
        return;
      }

      if (blockIndex > 0) {
        blockIndex -= 1;
        storyLines.innerHTML = "";
        for (let i = 0; i <= blockIndex; i++) {
          appendBlock(scenes[sceneIndex].blocks[i]);
        }
        renderSceneShell();
        return;
      }

      if (sceneIndex > 0) {
        sceneIndex -= 1;
        blockIndex = scenes[sceneIndex].blocks.length - 1;
        storyLines.innerHTML = "";
        questionBox.className = "question hidden";
        for (let i = 0; i <= blockIndex; i++) {
          appendBlock(scenes[sceneIndex].blocks[i]);
        }
        renderSceneShell();
      }
    }

    function restart() {
      sceneIndex = 0;
      blockIndex = -1;
      finished = false;
      tracesShown = false;
      storyLines.innerHTML = "";
      questionBox.innerHTML = "";
      questionBox.className = "question hidden";
      intro.classList.remove("hidden");
      sceneTitle.textContent = "";
      continueBtn.textContent = "Commencer";
      softNote.textContent = "Le carnet s’ouvre lentement.";
      sceneCounter.textContent = "Scène 1 / 6";
      languageLabel.textContent = "FR + IT";
      progressBar.style.width = "0";
      backBtn.classList.add("hidden");
    }

    continueBtn.addEventListener("click", showNext);
    backBtn.addEventListener("click", goBack);
  </script>
</body>
</html>
